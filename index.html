<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BL 追漫管家 | 專屬色控版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>追漫小管家</h1>
        <div class="stats">
            <p>總投資 C 幣：<span id="total-c-coins" class="highlight-c">0</span> C</p>
            <p>總投資金額：<span id="total-twd" class="highlight-twd">0</span> 元</p>
        </div>
    </header>

    <main>
        <section class="form-section">
            <h2>➕ 紀錄更新 (同名將自動覆蓋舊進度)</h2>
            <form id="media-form">
                <div class="form-group">
                    <input type="text" id="title" placeholder="作品名稱 (必填)" required>
                    <select id="platform">
                        <option value="bomtoon.tw">bomtoon.tw</option>
                        <option value="Webtoon">Webtoon</option>
                        <option value="鏡文學">鏡文學</option>
                        <option value="BW電子書">BW電子書</option>
                        <option value="gagaOOlala">gagaOOlala</option>
                        <option value="Netflix">Netflix</option>
                        <option value="電影院（實體）">電影院（實體）</option>
                    </select>
                </div>

                <div id="dynamic-fields" class="form-group"></div>

                <div class="form-group" id="group-status-day">
                    <select id="status">
                        <option value="ongoing">正在追</option>
                        <option value="completed">已完結 / 封存</option>
                    </select>
                    <select id="updateDay">
                        <option value="#週一連載">#週一連載</option>
                        <option value="#週二連載">#週二連載</option>
                        <option value="#週三連載">#週三連載</option>
                        <option value="#週四連載">#週四連載</option>
                        <option value="#週五連載">#週五連載</option>
                        <option value="#週六連載">#週六連載</option>
                        <option value="#週日連載">#週日連載</option>
                        <option value="#十天一次連載">#十天一次連載</option>
                        <option value="#不定期連載">#不定期連載</option>
                        <option value="#已完結">#已完結</option>
                    </select>
                </div>

                <div class="form-group" id="group-progress">
                    <input type="number" id="lastRead" placeholder="目前看到第幾話/次" min="0">
                    <input type="number" id="latestChapter" placeholder="平台更新至第幾話" min="0">
                </div>

                <button type="submit" id="submit-btn" class="btn-submit plat-bomtoon">確認儲存</button>
            </form>
        </section>

        <section id="update-alert" class="alert-section hidden">
            <h2>🔥 今日更新提醒 (有新進度未看)</h2>
            <ul id="update-list" class="card-list"></ul>
        </section>

        <section class="ongoing-section">
            <h2>📖 追坑中</h2>
            <ul id="ongoing-list" class="card-list"></ul>
        </section>

        <section class="completed-section">
            <h2>✅ 已完結戰績</h2>
            <ul id="completed-list" class="card-list"></ul>
        </section>
        
        <div style="text-align: center; padding: 40px 0;">
            <button id="clear-data" class="btn-clear">清空所有資料重來</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
