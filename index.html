<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追漫小管家 | 填坑紀錄</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>追漫小管家</h1>
        <div class="stats">
            <p>總投資 C 幣：<span id="total-coins" class="highlight">0</span> C</p>
        </div>
    </header>

    <main>
        <section class="form-section">
            <h2>➕ 新增作品 / 填坑紀錄</h2>
            <form id="media-form">
                <div class="form-group">
                    <input type="text" id="title" placeholder="作品名稱 (如: Jinx)" required>
                    <input type="text" id="platform" placeholder="平台 (如: Bomtoon)" required>
                </div>
                <div class="form-group">
                    <select id="status">
                        <option value="ongoing">正在追</option>
                        <option value="completed">已完結 / 封存</option>
                    </select>
                    <select id="updateDay">
                        <option value="null">更新日 (不定期 / 完結)</option>
                        <option value="1">每週一</option>
                        <option value="2">每週二</option>
                        <option value="3">每週三</option>
                        <option value="4">每週四</option>
                        <option value="5">每週五</option>
                        <option value="6">每週六</option>
                        <option value="0">每週日</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="number" id="chapterCost" placeholder="每話多少C幣" value="4" min="0" required>
                    <input type="number" id="purchasedChapters" placeholder="已購買話數" min="0" required>
                    <input type="number" id="extraCost" placeholder="額外花費C幣 (特輯/外傳等)" value="0" min="0">
                </div>
                <div class="form-group">
                    <input type="number" id="lastRead" placeholder="你目前看到第幾話" min="0" required>
                    <input type="number" id="latestChapter" placeholder="平台最新到第幾話" min="0" required>
                </div>
                <button type="submit" class="btn-submit">加入清單</button>
            </form>
        </section>

        <section id="update-alert" class="alert-section hidden">
            <h2>🔥 今日更新未看！快去補進度！</h2>
            <ul id="update-list" class="card-list"></ul>
        </section>

        <section class="ongoing-section">
            <h2>📖 正在追 & 未完結</h2>
            <ul id="ongoing-list" class="card-list"></ul>
        </section>

        <section class="completed-section">
            <h2>✅ 已完結 & 戰績封存</h2>
            <ul id="completed-list" class="card-list"></ul>
        </section>
        
        <div style="text-align: center; margin-top: 50px; margin-bottom: 20px;">
            <button id="clear-data" class="btn-clear">清空所有本機資料</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
